apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake-assistant-api
  labels:
    app: intake-assistant-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intake-assistant-api
  template:
    metadata:
      labels:
        app: intake-assistant-api
    spec:
      containers:
        - name: intake-assistant-api
          image: ghcr.io/seongmin15/intake/intake-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SDWC_API_URL
              value: "http://sdwc-api.sdwc.svc.cluster.local:8000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: intake-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: intake-assistant-api
  labels:
    app: intake-assistant-api
spec:
  type: ClusterIP
  selector:
    app: intake-assistant-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
