apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdwc-api
  labels:
    app: sdwc-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdwc-api
  template:
    metadata:
      labels:
        app: sdwc-api
    spec:
      containers:
        - name: sdwc-api
          image: ghcr.io/seongmin15/sdwc/sdwc-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: SDWC_RESOURCE_DIR
              value: /app/.sdwc
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sdwc-api
  labels:
    app: sdwc-api
spec:
  type: ClusterIP
  selector:
    app: sdwc-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
