apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdwc-web
  labels:
    app: sdwc-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdwc-web
  template:
    metadata:
      labels:
        app: sdwc-web
    spec:
      containers:
        - name: sdwc-web
          image: ghcr.io/seongmin15/sdwc/sdwc-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sdwc-web
  labels:
    app: sdwc-web
spec:
  type: ClusterIP
  selector:
    app: sdwc-web
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
